<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgenciaSysten — Financeiro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .fin-page { padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .fin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .fin-header h1 { font-size: 2rem; font-weight: 800; color: var(--text); }
    .fin-header-actions { display: flex; gap: 12px; }
    .fin-tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 24px; overflow-x: auto; scrollbar-width: none; }
    .fin-tabs::-webkit-scrollbar { display: none; }
    .fin-tab { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; color: var(--text-sub); font-weight: 500; display: flex; align-items: center; gap: 8px; transition: var(--transition); white-space: nowrap; }
    .fin-tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
    .fin-tab.active { border-bottom-color: var(--success); color: var(--success); font-weight: 700; }
    .fin-tab .material-symbols-outlined { font-size: 20px; }

    /* Dashboard Cards */
    .fin-dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .fin-card { background: var(--surface-low); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
    .fin-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; color: var(--text-sub); font-size: 0.9rem; font-weight: 600; }
    .fin-card-value { font-size: 2rem; font-weight: 800; }

    /* Tables */
    .fin-table-container { background: var(--surface-low); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
    .fin-table-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .fin-table { width: 100%; border-collapse: collapse; text-align: left; }
    .fin-table th { padding: 16px 20px; color: var(--text-sub); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
    .fin-table td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    .fin-table tr:last-child td { border-bottom: none; }

    /* Lançamentos Accordion */
    .fin-acc { background: var(--surface-low); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; transition: var(--transition); }
    .fin-acc-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
    .fin-acc-header:hover { background: rgba(255,255,255,0.02); }
    .fin-acc-body { display: none; padding: 16px; border-top: 1px solid var(--border); background: var(--bg); }
    .fin-acc.expanded .fin-acc-body { display: block; }
    .fin-acc.expanded .fin-acc-header { background: rgba(255,255,255,0.02); }

    .fin-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
    .fin-badge.pagar { background: var(--danger-bg); color: var(--danger); }
    .fin-badge.receber { background: rgba(0,214,143,0.1); color: var(--success); }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .cal-day-header { text-align: center; font-weight: 700; color: var(--text-sub); padding: 10px 0; font-size: 0.85rem; text-transform: uppercase; }
    .cal-cell { min-height: 100px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; transition: var(--transition); position: relative; display: flex; flex-direction: column; gap: 4px; }
    .cal-cell:hover { border-color: var(--text-sub); }
    .cal-cell.has-content { cursor: pointer; }
    .cal-cell-num { font-weight: 700; color: var(--text); margin-bottom: 8px; }

    /* Modals & Forms */
    .fin-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .fin-form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .fin-form-field label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); text-transform: uppercase; }
    .fin-form-field input, .fin-form-field select { padding: 10px 14px; background: var(--surface-mid); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-family: inherit; font-size: 0.95rem; }
    .fin-form-field input:focus, .fin-form-field select:focus { border-color: var(--accent); }

    /* Parcelas Gen */
    .parc-gen-row { display: flex; gap: 12px; align-items: center; padding: 12px; background: var(--surface-mid); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; }
  </style>
</head>
<body data-sidebar-page="financeiro">

  <div class="mod-page-wrapper">
    <main class="mod-main-content">
      <div class="fin-page">
        
        <div class="fin-header">
          <h1>Gestão Financeira</h1>
          <div class="fin-header-actions">
            <!-- <button class="btn btn-primary" onclick="openModal('modal-contabil')" style="background: #3b82f6;">
              <span class="material-symbols-outlined" style="font-size:18px;">add</span> Lançamento Contábil
            </button> -->
            <button class="btn btn-primary" onclick="openModal('modal-conta')" style="background: var(--success); color: #000;">
              <span class="material-symbols-outlined" style="font-size:18px;">add</span> Novo Lançamento
            </button>
          </div>
        </div>

        <div class="fin-tabs">
          <div class="fin-tab active" data-tab="dashboard" onclick="setTab('dashboard')">
            <span class="material-symbols-outlined">dashboard</span> Dashboard
          </div>
          <div class="fin-tab" data-tab="calendario" onclick="setTab('calendario')">
            <span class="material-symbols-outlined">calendar_month</span> Calendário
          </div>
          <div class="fin-tab" data-tab="lancamentos" onclick="setTab('lancamentos')">
            <span class="material-symbols-outlined">sync_alt</span> Lançamentos
          </div>
          <div class="fin-tab" data-tab="pessoas" onclick="setTab('pessoas')">
            <span class="material-symbols-outlined">groups</span> Entidades
          </div>
          <div class="fin-tab" data-tab="areas" onclick="setTab('areas')">
            <span class="material-symbols-outlined">business_center</span> Áreas de Custo
          </div>
        </div>

        <div id="loader" style="text-align: center; padding: 60px; color: var(--text-sub); display: none;">
          <span class="material-symbols-outlined" style="font-size:32px; animation: spin 1s linear infinite;">progress_activity</span>
        </div>

        <div id="tab-content">
          <!-- Conteúdo dinâmico via JS -->
        </div>

      </div>
    </main>
  </div>

  <!-- MODALS -->

  <!-- Modal Nova Conta -->
  <div class="modal-backdrop" id="modal-conta">
    <div class="fin-dark-modal" style="width: 100%; max-width: 650px; background: #111111; border: 1px solid #2a2b2f; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif;">
      
      <div class="fin-dark-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #1f1f23;">
        <h3 style="color: #ffffff; font-size: 1.1rem; font-weight: 700; margin: 0;">Novo Lançamento</h3>
        <button onclick="closeModal('modal-conta')" style="background: transparent; border: none; color: #a1a1aa; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s;"><span class="material-symbols-outlined" style="font-size: 20px;">close</span></button>
      </div>

      <form id="form-conta" style="display: flex; flex-direction: column;">
        <div style="padding: 24px; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;">
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Tipo</label>
              <select id="conta-tipo" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%23a1a1aa%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center;">
                <option value="PAGAR">A Pagar (Saída)</option>
                <option value="RECEBER">A Receber (Entrada)</option>
              </select>
            </div>
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Valor Total (R$)</label>
              <input type="number" step="0.01" id="conta-valor" required placeholder="0.00" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none;">
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Descrição da Conta</label>
            <input type="text" id="conta-descricao" required placeholder="Ex: Contrato Banda XYZ" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none;">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Projeto Relacionado</label>
              <input type="text" id="conta-projeto" placeholder="Ex: Projeto Y" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Pessoa (Fornecedor/Cliente)</label>
              <select id="conta-pessoa" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%23a1a1aa%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center;"></select>
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Área de Custo (Opcional)</label>
            <select id="conta-area" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%23a1a1aa%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center;">
              <option value="">Nenhuma / Geral</option>
            </select>
          </div>

          <div style="background: #17171a; border: 1px solid #2a2b2f; border-radius: 8px; padding: 20px; margin-top: 4px;">
            <h4 style="color: #ffffff; font-size: 0.95rem; font-weight: 700; margin-top: 0; margin-bottom: 16px;">Parcelamento e Vencimentos</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">Nº de Parcelas</label>
                <input type="number" id="conta-num-parcelas" min="1" value="1" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none;">
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: #a1a1aa; font-size: 0.8rem; font-weight: 500;">1º Vencimento base</label>
                <input type="date" id="conta-primeiro-venc" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 9px 12px; color: #f4f4f5; font-size: 0.95rem; outline: none;">
              </div>
            </div>
            <div id="parcelas-preview" style="margin-top: 16px;"></div>
          </div>

        </div>
        
        <div style="padding: 20px 24px; border-top: 1px solid #1f1f23; display: flex; gap: 16px;">
          <button type="button" onclick="closeModal('modal-conta')" style="flex: 0 0 auto; width: 140px; background: transparent; border: 1px solid #2a2b2f; color: #f4f4f5; padding: 12px; border-radius: 6px; font-weight: 500; font-size: 0.95rem; cursor: pointer; transition: background 0.2s;">Cancelar</button>
          <button type="submit" id="btn-salvar-conta" style="flex: 1; background: #10b981; border: none; color: #ffffff; padding: 12px; border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: filter 0.2s;">Salvar e Gerar Parcelas</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Nova Pessoa -->
  <div class="modal-backdrop" id="modal-pessoa">
    <div class="fin-dark-modal" style="width: 100%; max-width: 650px; background: #111111; border: 1px solid #2a2b2f; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif;">
      <div class="fin-dark-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #1f1f23;">
        <h3 id="pessoa-modal-title" style="color: #ffffff; font-size: 1.1rem; font-weight: 700; margin: 0;">Nova Entidade</h3>
        <button onclick="closeModal('modal-pessoa')" style="background: transparent; border: none; color: #a1a1aa; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s;"><span class="material-symbols-outlined" style="font-size: 20px;">close</span></button>
      </div>
      <form id="form-pessoa" style="display: flex; flex-direction: column;">
        <div style="padding: 24px; display: flex; flex-direction: row; gap: 16px;">
          <input type="hidden" id="pessoa-id">
          
          <div style="display: flex; flex-direction: column; gap: 6px; width: 140px;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Tipo</label>
            <select id="pessoa-tipo" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%23a1a1aa%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center;">
              <option value="FORNECEDOR">Fornecedor</option>
              <option value="CLIENTE">Cliente</option>
              <option value="AMBOS">Ambos</option>
            </select>
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Nome / Razão Social</label>
            <input type="text" id="pessoa-nome" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none;">
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Documento (CPF/CNPJ)</label>
            <input type="text" id="pessoa-doc" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none;">
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Contato Principal</label>
            <input type="text" id="pessoa-contato" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none;">
          </div>
          
        </div>
        <div style="padding: 20px 24px; border-top: 1px solid #1f1f23; display: flex; gap: 16px;">
          <button type="button" onclick="closeModal('modal-pessoa')" style="flex: 0 0 auto; width: 120px; background: #1a1a1a; border: 1px solid #2a2b2f; color: #f4f4f5; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s;">Cancelar</button>
          <button type="submit" style="flex: 1; background: #6366f1; border: none; color: #ffffff; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: filter 0.2s;">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Nova Area -->
  <div class="modal-backdrop" id="modal-area">
    <div class="fin-dark-modal" style="width: 100%; max-width: 500px; background: #111111; border: 1px solid #2a2b2f; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif;">
      <div class="fin-dark-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #1f1f23;">
        <h3 id="area-modal-title" style="color: #ffffff; font-size: 1.1rem; font-weight: 700; margin: 0;">Nova Área de Custo</h3>
        <button onclick="closeModal('modal-area')" style="background: transparent; border: none; color: #a1a1aa; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s;"><span class="material-symbols-outlined" style="font-size: 20px;">close</span></button>
      </div>
      <form id="form-area" style="display: flex; flex-direction: column;">
        <div style="padding: 24px; display: flex; flex-direction: column; gap: 16px;">
          <input type="hidden" id="area-id">
          
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Nome da Área</label>
            <input type="text" id="area-nome" required style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none;">
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="color: #a1a1aa; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">Descrição</label>
            <input type="text" id="area-descricao" style="background: #0a0a0b; border: 1px solid #2a2b2f; border-radius: 6px; padding: 10px 12px; color: #f4f4f5; font-size: 0.85rem; outline: none;">
          </div>
          
        </div>
        <div style="padding: 20px 24px; border-top: 1px solid #1f1f23; display: flex; gap: 16px;">
          <button type="button" onclick="closeModal('modal-area')" style="flex: 0 0 auto; width: 120px; background: #1a1a1a; border: 1px solid #2a2b2f; color: #f4f4f5; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s;">Cancelar</button>
          <button type="submit" style="flex: 1; background: #6366f1; border: none; color: #ffffff; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: filter 0.2s;">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Dia Calendário -->
  <div class="modal-backdrop" id="modal-dia">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3>Parcelas do dia <span id="dia-selecionado"></span></h3>
        <button class="modal-close" onclick="closeModal('modal-dia')"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="modal-body">
        <div id="dia-parcelas-list" style="max-height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;">
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/utils.js?v=2"></script>
  <script src="/js/sidebar.js?v=2"></script>
  <script src="/js/financeiro.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      const user = getUser();
      if (!user) return;
      if (user.role !== 'admin' && !user.perm_financeiro) {
        window.location.href = '/dashboard.html';
        return;
      }
      
      // Fallback para forçar o dashboard após 1 segundo caso fetchData falhe ou empaque silenciosamente
      setTimeout(() => {
        if (!document.querySelector('.fin-dash-grid')) {
          setTab('dashboard');
        }
      }, 1000);
    });
  </script>
</body>
</html>
