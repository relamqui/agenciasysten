<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quadro Kanban - Visualize e gerencie suas tarefas">
  <title>AgenciaSysten — Quadro</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body data-sidebar-page="agencia">
  <div class="app-layout" style="flex-direction:column; flex:1;">
    <!-- BOARD HEADER -->
    <header class="board-header" id="board-header">
      <a href="/dashboard" class="btn-icon" title="Voltar" style="text-decoration:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <input class="board-title-input" id="board-title" value="Carregando..." spellcheck="false">
      <div style="flex:1;"></div>
      <button class="btn btn-ghost btn-sm" id="add-member-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Membro
      </button>
      <button class="btn btn-ghost btn-sm" id="search-cards-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Buscar
      </button>
    </header>

    <!-- TABS E FILTROS -->
    <div class="board-tabs" style="display:flex; align-items:center;">
      <button class="board-tab-btn active" data-view="kanban">Quadro</button>
      <button class="board-tab-btn" data-view="list">Lista</button>
      
      <select id="designer-filter" style="display:none; margin-left:16px; padding:6px 12px; background:#1e1e2a; border:1px solid #333; border-radius:var(--radius-md); color:#fff; outline:none; font-family:var(--font); font-size:13px; cursor:pointer;">
        <option value="all" style="background:#1e1e2a; color:#fff;">Todos os designers</option>
      </select>
    </div>

    <!-- MAIN VIEWS -->
    <div class="board-content-wrapper" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <!-- KANBAN BOARD -->
      <div class="board-canvas" id="board-canvas">
        <!-- Lists rendered here -->
      </div>

      <!-- LIST VIEW -->
      <div class="list-view-container" id="list-view-container" style="display: none;">
        <!-- List groups rendered here -->
      </div>
    </div>
  </div>

  <!-- CLICKUP STYLE CARD MODAL -->
  <div class="modal-overlay clickup-overlay" id="card-modal">
    <div class="clickup-modal" id="clickup-modal-content">
      
      <!-- TOP BAR -->
      <div class="cu-topbar">
        <div class="cu-topbar-left">
          <div class="cu-task-type">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            Tarefa
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="cu-task-id" id="card-id-display">TSK-001</div>
        </div>
        <div class="cu-topbar-right">
          <button class="btn-icon cu-close-btn" id="close-card-modal">✕</button>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="cu-body">
        
        <!-- HEADER -->
        <div class="cu-header">
          <input type="text" class="cu-title-input" id="card-title-input" placeholder="Título da tarefa" spellcheck="false">
        </div>

        <!-- PROPERTIES GRID -->
        <div class="cu-properties-grid">
          <!-- Status -->
          <div class="cu-prop-row">
            <div class="cu-prop-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              Status
            </div>
            <div class="cu-prop-value">
              <button class="cu-status-btn" id="cu-status-btn">EM PROGRESSO <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
              <div class="cu-dropdown-menu" id="cu-status-dropdown" style="display: none;">
                <!-- Lists will be rendered here to change status -->
              </div>
            </div>
          </div>

          <!-- Assignees -->
          <div class="cu-prop-row">
            <div class="cu-prop-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Responsáveis
            </div>
            <div class="cu-prop-value">
              <div class="cu-assignee-empty" id="cu-assignee-btn">Vazio</div>
              <div class="cu-dropdown-menu" id="cu-assignee-dropdown" style="display: none;">
                <!-- Members rendered here -->
              </div>
            </div>
          </div>

          <!-- Dates -->
          <div class="cu-prop-row">
            <div class="cu-prop-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Datas
            </div>
            <div class="cu-prop-value cu-date-value" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
              <div style="display:flex; align-items:center; gap:4px;">
                <span style="font-size:11px; color:var(--text-muted); white-space:nowrap;">Início:</span>
                <input type="datetime-local" class="cu-invisible-date" id="card-start-date">
              </div>
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted); flex-shrink:0;"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              <div style="display:flex; align-items:center; gap:4px;">
                <span style="font-size:11px; color:var(--text-muted); white-space:nowrap;">Fim:</span>
                <input type="datetime-local" class="cu-invisible-date" id="card-due-date">
              </div>
            </div>
          </div>

          <!-- Priority -->
          <div class="cu-prop-row">
            <div class="cu-prop-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
              Prioridade
            </div>
            <div class="cu-prop-value" style="position:relative;">
              <button class="cu-priority-btn" id="cu-priority-btn">
                <span class="priority-dot" id="cu-priority-dot"></span>
                <span id="cu-priority-label">Normal</span>
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="cu-dropdown-menu" id="cu-priority-dropdown" style="display:none; min-width:160px;">
                <div class="cu-dropdown-item cu-priority-item" data-priority="urgente" data-color="#e74c3c" data-label="Urgente">
                  <span class="priority-dot" style="background:#e74c3c;"></span> 🔴 Urgente
                </div>
                <div class="cu-dropdown-item cu-priority-item" data-priority="alta" data-color="#e67e22" data-label="Alta">
                  <span class="priority-dot" style="background:#e67e22;"></span> 🟠 Alta
                </div>
                <div class="cu-dropdown-item cu-priority-item" data-priority="normal" data-color="#3498db" data-label="Normal">
                  <span class="priority-dot" style="background:#3498db;"></span> 🔵 Normal
                </div>
                <div class="cu-dropdown-item cu-priority-item" data-priority="baixa" data-color="#95a5a6" data-label="Baixa">
                  <span class="priority-dot" style="background:#95a5a6;"></span> ⚫ Baixa
                </div>
              </div>
            </div>
          </div>

          <!-- Empresa (Etiquetas) -->
          <div class="cu-prop-row">
            <div class="cu-prop-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              Empresa
            </div>
            <div class="cu-prop-value" style="position:relative;">
              <button class="cu-priority-btn" id="cu-empresa-btn" style="min-width:140px; justify-content:space-between;">
                <span id="cu-empresa-label">Selecionar...</span>
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              
              <div class="cu-dropdown-menu" id="cu-empresa-dropdown" style="display:none; min-width:200px; padding:6px; max-height:250px; overflow-y:auto;">
                <!-- Tags existentes renderizadas aqui pelo JS -->
                <div id="empresa-dropdown-list"></div>
                <div class="cu-divider" style="margin: 8px 0;"></div>
                <div class="cu-dropdown-item" id="open-create-empresa-modal-btn" style="color:#a1a1aa; font-weight:600; justify-content:center;">
                  + Criar tag
                </div>
              </div>

              <!-- Tags atribuídas (chips) -->
              <div class="labels-grid" id="card-labels-grid" style="margin-top:8px; min-height:0;"></div>
            </div>
          </div>

        </div>

        <div class="cu-divider"></div>

        <!-- DESCRIPTION -->
        <div class="cu-section">
          <div style="display:flex; align-items:center; margin-bottom: 8px;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px; color:var(--text-muted);"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
            <h3 class="cu-section-title" style="margin:0;">Descrição</h3>
          </div>
          <div class="cu-description-area">
            <div id="card-description-editor"></div>
          </div>
        </div>

        <div class="cu-divider"></div>

        <!-- ATTACHMENTS -->
        <div class="cu-section">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px;">
            <div style="display:flex; align-items:center;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px; color:var(--text-muted);"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <h3 class="cu-section-title" style="margin:0;">Anexos</h3>
            </div>
            <label class="btn btn-secondary btn-sm" style="cursor: pointer; padding: 4px 12px; margin: 0;">
              <input type="file" id="card-attachment-upload" style="display: none;" multiple>
              + Adicionar Arquivo
            </label>
          </div>
          <div id="attachments-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;">
            <!-- Render attachments here -->
          </div>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="cu-footer">
        <button class="btn btn-primary" id="save-card-btn" style="flex:1;">Salvar Alterações</button>
        <button class="btn btn-danger" id="delete-card-btn">Excluir Tarefa</button>
      </div>
    </div>
  </div>

  <!-- ADD MEMBER MODAL -->
  <div class="modal-overlay" id="member-modal">
    <div class="modal-content" style="max-width:400px;padding:24px;">
      <button class="btn-icon modal-close" id="close-member-modal">✕</button>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Adicionar Membro</h2>
      <div class="form-group">
        <label for="member-email">Email do membro</label>
        <input type="email" id="member-email" placeholder="membro@email.com">
      </div>
      <button class="btn btn-primary" id="invite-member-btn">Convidar</button>
      <div id="members-list" style="margin-top:16px;"></div>
    </div>
  </div>

  <!-- DESIGNER MODAL -->
  <div class="modal-overlay" id="designer-modal">
    <div class="modal-content" style="max-width:400px;padding:24px;">
      <button class="btn-icon modal-close" id="close-designer-modal">✕</button>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Gerenciar Designers</h2>
      <p style="font-size:13px; color:var(--text-muted); margin-bottom:16px;">Selecione os usuários que são designers na agência.</p>
      <div id="designers-list" style="margin-top:16px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
  </div>

  <!-- SEARCH MODAL -->
  <div class="modal-overlay" id="search-modal">
    <div class="modal-content" style="max-width:500px;padding:24px;">
      <button class="btn-icon modal-close" id="close-search-modal">✕</button>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Buscar Cartões</h2>
      <input type="text" id="search-input" placeholder="Digite para buscar..." style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font);font-size:14px;outline:none;margin-bottom:12px;">
      <div id="search-results"></div>
    </div>
  </div>

  <!-- CREATE EMPRESA MODAL -->
  <div class="modal-overlay" id="create-empresa-modal" style="z-index: 2000;">
    <div class="modal-content" style="max-width:360px;padding:24px;background:#1e1e1e;border:1px solid #333;">
      <button class="btn-icon modal-close" id="close-empresa-modal" style="color:#a1a1aa;">✕</button>
      <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;color:#fff;">Nova Empresa</h2>
      
      <div style="margin-bottom:12px;">
        <input type="text" id="new-empresa-name" placeholder="Nome da empresa..." style="width:100%; padding:8px 12px; font-size:13px; border-radius:6px; border:1px solid #3f3f46; background:#2a2b2f; color:white; outline:none; box-sizing:border-box;">
      </div>
      
      <div style="font-size:12px; color:#a1a1aa; margin-bottom:8px;">Cor da etiqueta:</div>
      <div class="label-color-swatches" id="empresa-color-swatches" style="margin-bottom:20px;">
        <div class="lcs" data-color="#e74c3c" style="background:#e74c3c;" title="Vermelho"></div>
        <div class="lcs" data-color="#e67e22" style="background:#e67e22;" title="Laranja"></div>
        <div class="lcs" data-color="#f1c40f" style="background:#f1c40f;" title="Amarelo"></div>
        <div class="lcs" data-color="#2ecc71" style="background:#2ecc71;" title="Verde"></div>
        <div class="lcs" data-color="#1abc9c" style="background:#1abc9c;" title="Teal"></div>
        <div class="lcs" data-color="#3498db" style="background:#3498db;" title="Azul"></div>
        <div class="lcs selected" data-color="#6C5CE7" style="background:#6C5CE7;" title="Roxo"></div>
        <div class="lcs" data-color="#e91e63" style="background:#e91e63;" title="Rosa"></div>
        <div class="lcs" data-color="#607d8b" style="background:#607d8b;" title="Cinza azul"></div>
        <div class="lcs" data-color="#795548" style="background:#795548;" title="Marrom"></div>
        <div class="lcs" data-color="#fd79a8" style="background:#fd79a8;" title="Rosa claro"></div>
        <div class="lcs" data-color="#00b894" style="background:#00b894;" title="Verde claro"></div>
      </div>
      <input type="hidden" id="new-empresa-color" value="#6C5CE7">
      
      <button class="btn btn-primary" id="submit-create-empresa-btn" style="width:100%;">+ Criar Empresa</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="/js/board.js?v=10004"></script>
</body>
</html>
