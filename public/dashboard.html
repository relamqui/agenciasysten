<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard - Gerencie seus quadros Kanban">
  <title>AgenciaSysten — Agência</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body data-sidebar-page="agencia">
  <div class="app-layout">
    <!-- SIDEBAR (loaded via sidebar.js) -->

    <!-- MAIN -->
    <main class="main-content">
      <header class="main-header">
        <h1 class="main-title">Quadros da Agência</h1>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="search-boards" placeholder="Buscar quadros..." style="padding:8px 14px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-family:var(--font);font-size:13px;outline:none;width:200px;">
        </div>
      </header>

      <div class="boards-grid" id="boards-grid">
        <!-- Boards rendered here -->
      </div>

      <!-- MEUS CARTÕES -->
      <section class="home-section" id="my-cards-section" style="display:none;">
        <div class="home-section-header">
          <div class="home-section-title">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="9" x2="21" y2="9"/><line x1="15" y1="15" x2="21" y2="15"/></svg>
            Meus Cartões
          </div>
          <span class="home-section-count" id="my-cards-count">0</span>
        </div>
        <div id="my-cards-list" class="my-cards-list">
          <!-- Rendered via JS -->
        </div>
      </section>

      <!-- CALENDÁRIO -->
      <section class="home-section" id="calendar-section" style="display:none;">
        <div class="home-section-header">
          <div class="home-section-title">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Calendário
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
            <span id="cal-month-label" style="font-weight:600; font-size:15px; min-width:160px; text-align:center;"></span>
            <button class="cal-nav-btn" id="cal-next">&#8250;</button>
            <button class="btn btn-primary" id="open-personal-task-modal-btn" style="margin-left:16px; padding:6px 12px; font-size:12px;">+ Tarefa Pessoal</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>
        <div class="cal-grid" id="cal-grid">
          <!-- Rendered via JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- PERSONAL TASK MODAL -->
  <div class="modal-overlay clickup-overlay" id="personal-task-modal">
    <div class="modal-content" style="max-width:500px;padding:24px;">
      <button class="btn-icon modal-close" id="close-personal-modal">✕</button>
      <h2 id="personal-task-modal-title" style="font-size:18px;font-weight:700;margin-bottom:16px;">Nova Tarefa Pessoal</h2>
      
      <input type="hidden" id="personal-task-id">
      
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="personal-task-title" placeholder="O que você precisa fazer?" required style="background:rgba(255,255,255,0.03);border:1px solid #333;color:#fff;">
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="personal-task-desc" rows="4" placeholder="Detalhes (opcional)..." style="width:100%;background:rgba(255,255,255,0.03);border:1px solid #333;border-radius:6px;color:#fff;padding:8px;outline:none;font-family:inherit;font-size:13px;resize:vertical;"></textarea>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
        <div class="form-group">
          <label>Início</label>
          <input type="datetime-local" id="personal-task-start" style="background:rgba(255,255,255,0.03);border:1px solid #333;color:#fff;">
        </div>
        <div class="form-group">
          <label>Entrega</label>
          <input type="datetime-local" id="personal-task-due" style="background:rgba(255,255,255,0.03);border:1px solid #333;color:#fff;">
        </div>
      </div>
      
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <button class="btn" id="delete-personal-task-btn" style="display:none;background:rgba(231,76,60,0.1);color:#e74c3c;border:1px solid rgba(231,76,60,0.2);">Excluir</button>
        <div style="flex:1;"></div>
        <button class="btn btn-primary" id="save-personal-task-btn">Salvar Tarefa</button>
      </div>
    </div>
  </div>

  <!-- CREATE BOARD MODAL -->
  <div class="modal-overlay create-board-modal" id="create-board-modal">
    <div class="modal-content" style="max-width:440px;padding:24px;">
      <button class="btn-icon modal-close" id="close-create-modal">✕</button>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Criar Quadro</h2>
      <div class="form-group">
        <label for="new-board-title">Nome do Quadro</label>
        <input type="text" id="new-board-title" placeholder="Ex: Projeto Website" required>
      </div>
      <div class="form-group">
        <label>Cor de Fundo</label>
        <div class="bg-options" id="bg-options"></div>
      </div>
      <button class="btn btn-primary" id="create-board-btn">Criar Quadro</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
